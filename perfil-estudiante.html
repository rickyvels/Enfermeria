<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurar Perfil Estudiante - NurseCore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 font-sans text-slate-800 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-xl border border-slate-100 transition-all duration-300">
        <div class="text-center mb-8">
            <div class="text-5xl mb-3">🎓</div>
            <h1 class="text-3xl font-black text-emerald-950 tracking-tight">Perfil Académico</h1>
            <p class="text-sm text-slate-400 font-medium mt-1">Configura tu entorno para el manejo de simulaciones y guías</p>
        </div>

        <form id="formPerfilEst" onsubmit="guardarPerfilEstudiante(event)" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-emerald-900 uppercase tracking-wider mb-2">Universidad / Instituto</label>
                <input type="text" id="estUniversidad" required 
                       class="w-full px-4 py-3.5 rounded-xl border border-slate-200 focus:outline-none focus:border-emerald-500 bg-slate-50 text-sm font-medium transition-colors" 
                       placeholder="Ej. Universidad Católica San Pablo">
            </div>

            <div>
                <label class="block text-xs font-bold text-emerald-900 uppercase tracking-wider mb-2">Ciclo / Semestre Académico</label>
                <input type="text" id="estCiclo" required 
                       class="w-full px-4 py-3.5 rounded-xl border border-slate-200 focus:outline-none focus:border-emerald-500 bg-slate-50 text-sm font-medium transition-colors" 
                       placeholder="Ej. 6to Semestre">
            </div>

            <div>
                <label class="block text-xs font-bold text-emerald-900 uppercase tracking-wider mb-2">Docente Supervisor</label>
                <input type="text" id="estDocente" required 
                       class="w-full px-4 py-3.5 rounded-xl border border-slate-200 focus:outline-none focus:border-emerald-500 bg-slate-50 text-sm font-medium transition-colors" 
                       placeholder="Ej. Dra. María Mendoza">
            </div>

            <button type="submit" class="w-full bg-[#86efac] hover:bg-[#6be094] text-emerald-950 font-bold py-4 rounded-xl shadow-md hover:shadow-lg transition-all text-sm mt-6 flex items-center justify-center gap-2 transform hover:-translate-y-0.5">
                <span>Guardar y Finalizar Configuración</span> →
            </button>
        </form>
    </div>

    <script src="app.js"></script>
    <script>
        function guardarPerfilEstudiante(event) {
            event.preventDefault();
            
            const universidad = document.getElementById("estUniversidad").value.trim();
            const ciclo = document.getElementById("estCiclo").value.trim();
            const docente = document.getElementById("estDocente").value.trim();

            localStorage.setItem("est_universidad", universidad);
            localStorage.setItem("est_ciclo", ciclo);
            localStorage.setItem("est_docente", docente);
            localStorage.setItem("perfilConfigurado", "true");

            window.location.href = "dashboard-estudiante.html";
        }
    </script>
</body>
</html>
