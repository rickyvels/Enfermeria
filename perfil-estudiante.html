<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Estudiante — NurseCore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">

    <button
        onclick="history.back()"
        class="absolute top-6 left-6 bg-white px-5 py-3 rounded-2xl shadow hover:scale-105 transition text-slate-700 font-medium"
    >
        ← Regresar
    </button>

    <div class="bg-white w-[550px] p-10 rounded-3xl shadow-xl">

        <div class="text-center mb-8">
            <div class="text-5xl mb-3">🎓</div>
            <h1 class="text-4xl font-bold text-blue-600">Perfil Estudiante</h1>
            <p class="text-slate-500 mt-2">Completa tu información académica</p>
        </div>

        <div class="space-y-5">

            <input
                type="text"
                placeholder="Universidad"
                class="input-light"
            />

            <input
                type="text"
                placeholder="Ciclo / Semestre"
                class="input-light"
            />

            <input
                type="text"
                placeholder="Centro de prácticas"
                class="input-light"
            />

            <input
                type="text"
                placeholder="Supervisor (Opcional)"
                class="input-light"
            />

            <!-- irDashboard() va al dashboard-estudiante.html -->
            <button
                onclick="irDashboard()"
                class="btn-primary"
            >
                Finalizar Registro
            </button>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
