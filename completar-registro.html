<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Completar Registro - NurseCore</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#1e293b] min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-[#0f172a] p-8 rounded-3xl shadow-2xl border border-slate-800">

        <!-- Header con avatar Google -->
        <div class="text-center mb-8">
            <div class="relative inline-block mb-4">
                <img id="googleAvatar" src="" alt="Avatar" class="w-20 h-20 rounded-full mx-auto border-4 border-[#2EC4B6] object-cover hidden">
                <div id="avatarFallback" class="w-20 h-20 rounded-full mx-auto border-4 border-[#2EC4B6] bg-teal-900 flex items-center justify-center text-3xl">👤</div>
                <span class="absolute bottom-0 right-0 bg-white rounded-full p-1 shadow">
                    <svg class="w-4 h-4" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                </span>
            </div>
            <h1 class="text-2xl font-black text-[#2EC4B6]">¡Bienvenido a NurseCore!</h1>
            <p class="text-slate-400 text-sm mt-1">Cuenta Google verificada. Solo falta un paso.</p>
            <p class="text-teal-400 font-semibold text-sm mt-2" id="googleEmail"></p>
        </div>

        <div class="space-y-5">
            <!-- Nombre (prellenado desde Google) -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Nombre Completo</label>
                <input type="text" id="regNombre"
                    class="w-full px-4 py-3.5 rounded-xl border border-slate-700 focus:outline-none focus:border-[#2EC4B6] bg-slate-900 text-sm font-medium text-white transition-colors"
                    placeholder="Tu nombre completo">
            </div>

            <!-- Código de identificación -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Código de Identificación</label>
                <input type="text" id="regCodigo"
                    class="w-full px-4 py-3.5 rounded-xl border border-slate-700 focus:outline-none focus:border-[#2EC4B6] bg-slate-900 text-sm font-medium text-white transition-colors"
                    placeholder="CEP-12345 o código de estudiante">
                <p class="text-xs text-slate-500 mt-1.5">Este código te identificará dentro del sistema</p>
            </div>

            <!-- Tipo de usuario -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Tipo de Usuario</label>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="selTipo('profesional')" id="btnProfesional"
                        class="tipo-btn border-2 border-[#2EC4B6] bg-[#2EC4B6]/10 text-[#2EC4B6] font-bold py-4 rounded-xl text-sm transition-all flex flex-col items-center gap-1">
                        <span class="text-2xl">🧑‍⚕️</span>
                        Profesional
                    </button>
                    <button onclick="selTipo('estudiante')" id="btnEstudiante"
                        class="tipo-btn border-2 border-slate-700 hover:border-slate-500 text-slate-400 font-bold py-4 rounded-xl text-sm transition-all flex flex-col items-center gap-1">
                        <span class="text-2xl">📚</span>
                        Estudiante
                    </button>
                </div>
            </div>

            <div id="regError" class="hidden bg-red-900/40 border border-red-700 text-red-300 text-sm px-4 py-3 rounded-xl"></div>

            <button onclick="completarRegistro()" id="btnCompletar"
                class="w-full bg-[#2EC4B6] hover:bg-[#239c90] text-slate-950 font-black py-4 rounded-xl shadow-md transition-all text-sm mt-2 flex items-center justify-center gap-2">
                <span id="btnText">Completar Registro →</span>
            </button>
        </div>
    </div>

    <script src="supabase.js"></script>
    <script>
    let tipoSeleccionado = 'profesional';

    // Precargar datos de Google
    document.addEventListener('DOMContentLoaded', () => {
        const email = localStorage.getItem('nc_google_email');
        const nombre = localStorage.getItem('nc_google_nombre');
        const avatar = localStorage.getItem('nc_google_avatar');

        if (!email) { window.location.href = 'registro.html'; return; }

        document.getElementById('googleEmail').textContent = email;
        document.getElementById('regNombre').value = nombre || '';

        if (avatar) {
            const img = document.getElementById('googleAvatar');
            img.src = avatar;
            img.classList.remove('hidden');
            document.getElementById('avatarFallback').classList.add('hidden');
        }
    });

    function selTipo(tipo) {
        tipoSeleccionado = tipo;
        document.getElementById('btnProfesional').className = tipo === 'profesional'
            ? 'tipo-btn border-2 border-[#2EC4B6] bg-[#2EC4B6]/10 text-[#2EC4B6] font-bold py-4 rounded-xl text-sm transition-all flex flex-col items-center gap-1'
            : 'tipo-btn border-2 border-slate-700 hover:border-slate-500 text-slate-400 font-bold py-4 rounded-xl text-sm transition-all flex flex-col items-center gap-1';
        document.getElementById('btnEstudiante').className = tipo === 'estudiante'
            ? 'tipo-btn border-2 border-[#2EC4B6] bg-[#2EC4B6]/10 text-[#2EC4B6] font-bold py-4 rounded-xl text-sm transition-all flex flex-col items-center gap-1'
            : 'tipo-btn border-2 border-slate-700 hover:border-slate-500 text-slate-400 font-bold py-4 rounded-xl text-sm transition-all flex flex-col items-center gap-1';
    }

    async function completarRegistro() {
        const nombre = document.getElementById('regNombre').value.trim();
        const codigo = document.getElementById('regCodigo').value.trim();
        const email  = localStorage.getItem('nc_google_email');
        const avatar = localStorage.getItem('nc_google_avatar');
        const errorDiv = document.getElementById('regError');
        const btnText = document.getElementById('btnText');

        if (!nombre || !codigo) {
            errorDiv.textContent = '⚠️ Completa todos los campos.';
            errorDiv.classList.remove('hidden');
            return;
        }

        btnText.textContent = 'Guardando...';
        document.getElementById('btnCompletar').disabled = true;
        errorDiv.classList.add('hidden');

        try {
            // Verificar código único
            const codigoExiste = await db.select('usuarios', `codigo=eq.${encodeURIComponent(codigo)}`);
            if (codigoExiste.length > 0) {
                errorDiv.textContent = '❌ Ese código ya está en uso. Elige otro.';
                errorDiv.classList.remove('hidden');
                btnText.textContent = 'Completar Registro →';
                document.getElementById('btnCompletar').disabled = false;
                return;
            }

            const result = await db.insert('usuarios', {
                nombre, email, codigo,
                tipo: tipoSeleccionado,
                avatar_url: avatar || null
            });

            const usuario = result[0];
            guardarSesionLocal(usuario);

            // Limpiar temporales
            localStorage.removeItem('nc_google_email');
            localStorage.removeItem('nc_google_nombre');
            localStorage.removeItem('nc_google_avatar');

            window.location.href = 'elegir-usuario.html';
        } catch(e) {
            errorDiv.textContent = '❌ Error: ' + (e.message || JSON.stringify(e));
            errorDiv.classList.remove('hidden');
            btnText.textContent = 'Completar Registro →';
            document.getElementById('btnCompletar').disabled = false;
        }
    }
    </script>
</body>
</html>
