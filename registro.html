<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center">

<button
onclick="history.back()"
class="absolute top-6 left-6 bg-white px-5 py-3 rounded-2xl shadow hover:scale-105 transition"
>
← Regresar
</button>

<div class="bg-white p-10 rounded-3xl shadow-xl w-[500px]">

<h1 class="text-4xl font-bold text-blue-600 mb-8 text-center">
Registro
</h1>

<div class="space-y-5">

<input
type="text"
placeholder="Nombres y apellidos"
class="input-style"
/>

<input
type="email"
placeholder="Correo"
class="input-style"
/>

<input
type="password"
placeholder="Contraseña"
class="input-style"
/>

<input
type="password"
placeholder="Confirmar contraseña"
class="input-style"
/>

<button
onclick="irDashboard()"
class="btn-primary"
>
Continuar
</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
