<form id="registroForm" class="space-y-4" onsubmit="validarRegistro(event)">
    <div>
        <label class="block text-sm font-semibold text-slate-600 mb-1">Nombre Completo</label>
        <input type="text" id="regNombre" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-teal-500 bg-slate-50 text-sm" placeholder="Juan Pérez">
    </div>
    <div>
        <label class="block text-sm font-semibold text-slate-600 mb-1">Identificación Médica / Código Estudiante</label>
        <input type="text" id="regCodigo" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-teal-500 bg-slate-50 text-sm" placeholder="NUC-10293">
    </div>

    <button type="submit" class="w-full bg-[#2EC4B6] hover:bg-[#259b8f] text-slate-950 font-bold py-3 rounded-xl shadow-md transition-all text-sm mt-4">
        Registrar y Configurar Perfil
    </button>
</form>

<script>
function validarRegistro(event) {
    event.preventDefault();
    
    const nombre = document.getElementById("regNombre").value.trim();
    const codigo = document.getElementById("regCodigo").value.trim();

    if (nombre !== "" && codigo !== "") {
        localStorage.setItem("nombreUsuario", nombre);
        localStorage.setItem("codigoUsuario", codigo);

        // LEER EL ROL: Dependiendo de lo que eligió en elegir-usuario.html, lo mandamos a su perfil real
        const tipo = localStorage.getItem("tipoUsuario");
        if (tipo === "profesional") {
            window.location.href = "perfil-profesional.html";
        } else if (tipo === "estudiante") {
            window.location.href = "perfil-estudiante.html";
        } else {
            window.location.href = "elegir-usuario.html"; // Por si acaso
        }
    }
}
</script>
