<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - NurseCore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#1e293b] font-sans text-slate-200 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-[#0f172a] p-8 rounded-3xl shadow-2xl border border-slate-800 transition-all duration-300">
        
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-[#2EC4B6] tracking-tight">Crea tu Cuenta</h1>
            <p class="text-xs text-slate-400 font-medium mt-2 uppercase tracking-wider">Paso previo a la configuración de perfil</p>
        </div>

        <form id="registroForm" class="space-y-5" onsubmit="validarRegistro(event)">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Nombre Completo</label>
                <input type="text" id="regNombre" required 
                       class="w-full px-4 py-3.5 rounded-xl border border-slate-700 focus:outline-none focus:border-[#2EC4B6] bg-slate-900 text-sm font-medium text-white transition-colors" 
                       placeholder="Juan Pérez">
            </div>
            
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Identificación Médica / Código Estudiante</label>
                <input type="text" id="regCodigo" required 
                       class="w-full px-4 py-3.5 rounded-xl border border-slate-700 focus:outline-none focus:border-[#2EC4B6] bg-slate-900 text-sm font-medium text-white transition-colors" 
                       placeholder="NUC-10293">
            </div>

            <button type="submit" class="w-full bg-[#2EC4B6] hover:bg-[#259b8f] text-slate-950 font-black py-4 rounded-xl shadow-md hover:shadow-xl transition-all text-sm mt-6 flex items-center justify-center gap-2 transform hover:-translate-y-0.5">
                Registrar y Configurar Perfil →
            </button>
        </form>

        <div class="text-center mt-6">
            <p class="text-xs text-slate-500">¿Ya tienes cuenta? <a href="login.html" class="text-[#2EC4B6] hover:underline font-semibold">Inicia sesión</a></p>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
    function validarRegistro(event) {
        event.preventDefault();
        
        const nombre = document.getElementById("regNombre").value.trim();
        const codigo = document.getElementById("regCodigo").value.trim();

        if (nombre !== "" && codigo !== "") {
            // 1. Limpiamos cualquier rastro de sesiones o roles antiguos
            localStorage.removeItem("tipoUsuario"); 
            
            // 2. Guardamos los datos del nuevo usuario
            localStorage.setItem("nombreUsuario", nombre);
            localStorage.setItem("codigoUsuario", codigo);

            // 3. Creamos la sesión automática con el correo ficticio
            const correoAuto = `${codigo.toLowerCase()}@nursecore.com`;
            localStorage.setItem("usuarioLogueado", correoAuto);

            alert("✨ ¡Cuenta creada con éxito! Vamos a configurar tu perfil.");

            // 4. Redirección directa a elegir el rol
            window.location.href = "elegir-usuario.html";
        }
    }
    </script>
</body>
</html>
