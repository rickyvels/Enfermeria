<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - NurseCore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#1e293b] font-sans text-slate-200 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-[#0f172a] p-8 rounded-3xl shadow-2xl border border-slate-800 transition-all duration-300">
        
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-[#2EC4B6] tracking-tight">Crea tu Cuenta</h1>
            <p class="text-xs text-slate-400 font-medium mt-2 uppercase tracking-wider">Paso previo a la configuración de perfil</p>
        </div>

        <div id="registroForm" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Nombre Completo</label>
                <input type="text" id="regNombre" required 
                       class="w-full px-4 py-3.5 rounded-xl border border-slate-700 focus:outline-none focus:border-[#2EC4B6] bg-slate-900 text-sm font-medium text-white transition-colors" 
                       placeholder="Juan Pérez">
            </div>
            
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Correo Electrónico</label>
                <input type="email" id="regEmail" required 
                       class="w-full px-4 py-3.5 rounded-xl border border-slate-700 focus:outline-none focus:border-[#2EC4B6] bg-slate-900 text-sm font-medium text-white transition-colors" 
                       placeholder="juan@ejemplo.com">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Identificación Médica / Código Estudiante</label>
                <input type="text" id="regCodigo" required 
                       class="w-full px-4 py-3.5 rounded-xl border border-slate-700 focus:outline-none focus:border-[#2EC4B6] bg-slate-900 text-sm font-medium text-white transition-colors" 
                       placeholder="NUC-10293 (este será tu contraseña)">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Tipo de Usuario</label>
                <select id="regTipo" class="w-full px-4 py-3.5 rounded-xl border border-slate-700 focus:outline-none focus:border-[#2EC4B6] bg-slate-900 text-sm font-medium text-white transition-colors">
                    <option value="profesional">Profesional de Enfermería</option>
                    <option value="estudiante">Estudiante de Enfermería</option>
                </select>
            </div>

            <div id="regError" class="hidden bg-red-900/40 border border-red-700 text-red-300 text-sm px-4 py-3 rounded-xl"></div>

            <button onclick="validarRegistro()" id="btnRegistro" class="w-full bg-[#2EC4B6] hover:bg-[#259b8f] text-slate-950 font-black py-4 rounded-xl shadow-md hover:shadow-xl transition-all text-sm mt-6 flex items-center justify-center gap-2 transform hover:-translate-y-0.5">
                <span id="btnRegText">Registrar y Configurar Perfil</span> →
            </button>
        </div>

        <div class="text-center mt-6">
            <p class="text-xs text-slate-500">¿Ya tienes cuenta? <a href="login.html" class="text-[#2EC4B6] hover:underline font-semibold">Inicia sesión</a></p>
        </div>
    </div>

    <script src="supabase.js"></script>
    <script src="app.js"></script>
    <script>
    async function validarRegistro() {
        const nombre = document.getElementById("regNombre").value.trim();
        const email = document.getElementById("regEmail").value.trim();
        const codigo = document.getElementById("regCodigo").value.trim();
        const tipo = document.getElementById("regTipo").value;
        const errorDiv = document.getElementById("regError");
        const btnText = document.getElementById("btnRegText");

        if (!nombre || !email || !codigo) {
            mostrarError("Por favor completa todos los campos.");
            return;
        }

        btnText.textContent = "Registrando...";
        document.getElementById("btnRegistro").disabled = true;
        errorDiv.classList.add('hidden');

        const { data, error } = await registrarUsuario(nombre, codigo, email, tipo);

        if (error) {
            mostrarError(error);
            btnText.textContent = "Registrar y Configurar Perfil";
            document.getElementById("btnRegistro").disabled = false;
        } else {
            // Guardar sesión
            localStorage.setItem('nc_usuario_id', data.id);
            localStorage.setItem('nc_usuario_nombre', data.nombre);
            localStorage.setItem('nc_usuario_email', data.email);
            localStorage.setItem('tipoUsuario', data.tipo);
            localStorage.setItem('usuarioLogueado', data.email);
            localStorage.setItem('nombreUsuario', data.nombre);
            localStorage.setItem('codigoUsuario', data.codigo);

            window.location.href = "elegir-usuario.html";
        }
    }

    function mostrarError(msg) {
        const errorDiv = document.getElementById("regError");
        errorDiv.textContent = "❌ " + msg;
        errorDiv.classList.remove('hidden');
    }
    </script>
</body>
</html>
