<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Estudiante — NurseCore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-100">

    <button
        onclick="history.back()"
        class="fixed top-6 left-6 z-50 bg-white px-5 py-3 rounded-2xl shadow hover:scale-105 transition text-slate-700 font-medium"
    >
        ← Regresar
    </button>

    <div class="flex">

        <aside class="w-[260px] min-h-screen bg-white shadow-xl p-6">
            <h1 class="text-3xl font-bold text-blue-600 mb-10">NurseCore</h1>
            <nav class="space-y-4">
                <a href="dashboard-estudiante.html" class="sidebar-item-light active">Dashboard</a>
                <a href="#" class="sidebar-item-light">Casos Clínicos</a>
                <a href="#" class="sidebar-item-light">Registro de Prácticas</a>
                <a href="#" class="sidebar-item-light">Guías</a>
                <a href="#" class="sidebar-item-light">Evaluaciones</a>
            </nav>
        </aside>

        <main class="flex-1 p-10">

            <div class="flex justify-between items-center mb-10">
                <div>
                    <h2 class="text-5xl font-bold text-slate-800">Dashboard Estudiante</h2>
                    <p class="text-slate-500 mt-2">Panel académico y clínico</p>
                </div>
                <div id="usuarioTexto" class="bg-white px-6 py-4 rounded-2xl shadow font-semibold text-slate-700"></div>
            </div>

            <div class="grid grid-cols-4 gap-6">
                <div class="bg-white p-6 rounded-3xl shadow-xl card-hover">
                    <h3 class="text-slate-500">Casos Clínicos</h3>
                    <p class="text-4xl font-bold text-blue-600 mt-3">12</p>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-xl card-hover">
                    <h3 class="text-slate-500">Prácticas</h3>
                    <p class="text-4xl font-bold text-green-500 mt-3">28</p>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-xl card-hover">
                    <h3 class="text-slate-500">Guías</h3>
                    <p class="text-4xl font-bold text-purple-500 mt-3">9</p>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-xl card-hover">
                    <h3 class="text-slate-500">Evaluaciones</h3>
                    <p class="text-4xl font-bold text-red-500 mt-3">4</p>
                </div>
            </div>

            <div class="bg-white mt-10 p-8 rounded-3xl shadow-xl">
                <h3 class="text-2xl font-bold mb-6">Actividad reciente</h3>
                <div class="space-y-4">
                    <div class="bg-slate-50 p-4 rounded-2xl hover:bg-slate-100 transition text-slate-700">Nuevo caso clínico disponible</div>
                    <div class="bg-slate-50 p-4 rounded-2xl hover:bg-slate-100 transition text-slate-700">Práctica supervisada registrada</div>
                    <div class="bg-slate-50 p-4 rounded-2xl hover:bg-slate-100 transition text-slate-700">Evaluación pendiente</div>
                </div>
            </div>

        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
