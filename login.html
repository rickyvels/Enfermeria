<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NurseCore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#1e293b] font-sans text-slate-200 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-[#0f172a] p-8 rounded-3xl shadow-2xl border border-slate-800">
        
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-[#2EC4B6] tracking-tight">NurseCore</h1>
            <p class="text-xs text-slate-400 font-medium mt-2 uppercase tracking-wider">Sistema de Enfermería</p>
        </div>

        <form id="loginForm" onsubmit="validarLogin(event)" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Correo Electrónico</label>
                <input type="email" id="loginEmail" required 
                       class="w-full px-4 py-3.5 rounded-xl border border-slate-700 focus:outline-none focus:border-[#2EC4B6] bg-slate-900 text-sm font-medium text-white transition-colors" 
                       placeholder="ejemplo@nursecore.com">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Contraseña (Tu Código)</label>
                <input type="password" id="loginPassword" required 
                       class="w-full px-4 py-3.5 rounded-xl border border-slate-700 focus:outline-none focus:border-[#2EC4B6] bg-slate-900 text-sm font-medium text-white transition-colors" 
                       placeholder="••••••••">
            </div>

            <button type="submit" class="w-full bg-[#2EC4B6] hover:bg-[#239c90] text-slate-950 font-black py-4 rounded-xl shadow-md hover:shadow-xl transition-all text-sm mt-6 flex items-center justify-center gap-2 transform hover:-translate-y-0.5">
                <span>Ingresar</span> →
            </button>
        </form>

        <div class="text-center mt-6">
            <p class="text-xs text-slate-500">¿No tienes una cuenta? <a href="registro.html" class="text-[#2EC4B6] hover:underline font-semibold">Regístrate aquí</a></p>
        </div>
    </div>

    <script>
        function validarLogin(event) {
            event.preventDefault(); 
            
            // Convertimos a minúsculas para evitar problemas de mayúsculas/minúsculas en el correo
            const email = document.getElementById("loginEmail").value.trim().toLowerCase();
            const pass = document.getElementById("loginPassword").value.trim();

            const codigoRegistrado = localStorage.getItem("codigoUsuario");
            const nombreRegistrado = localStorage.getItem("nombreUsuario");

            // Si el código no existe en la máquina, significa que nunca se ha registrado nadie aquí
            if (!codigoRegistrado || !nombreRegistrado) {
                alert("❌ Error: No hay ninguna cuenta registrada en este dispositivo. Por favor, regístrate primero.");
                window.location.href = "registro.html";
                return;
            }

            // Construimos de forma exacta el correo que se generó
            const correoEsperado = `${codigoRegistrado.toLowerCase()}@nursecore.com`;
            
            // Validación estricta
            if (email === correoEsperado && pass === codigoRegistrado) {
                // Guardamos la sesión activa
                localStorage.setItem("usuarioLogueado", email);
                
                // 🚀 LÓGICA INTELIGENTE DE ENRUTAMIENTO:
                // Evaluamos si el usuario ya tiene un rol guardado previamente en el equipo
                const rolExistente = localStorage.getItem("tipoUsuario");
                
                if (rolExistente) {
                    if (rolExistente === "estudiante") {
                        window.location.href = "dashboard-estudiante.html";
                    } else if (rolExistente === "profesional") {
                        window.location.href = "dashboard-profesional.html";
                    }
                } else {
                    // Si se registró pero cerró la pestaña antes de elegir rol, lo mandamos aquí
                    window.location.href = "elegir-usuario.html";
                }
                
            } else {
                alert("❌ Credenciales incorrectas. Usa el correo generado en el registro y tu código como contraseña.");
            }
        }
    </script>
</body>
</html>
