<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NurseCore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#1e293b] font-sans text-slate-200 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-[#0f172a] p-8 rounded-3xl shadow-2xl border border-slate-800 transition-all duration-300">
        
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-[#2EC4B6] tracking-tight">NurseCore</h1>
            <p class="text-xs text-slate-400 font-medium mt-2 uppercase tracking-wider">Sistema de Enfermería</p>
        </div>

        <div id="loginForm" class="space-y-5">
            
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Correo Electrónico</label>
                <input type="email" id="loginEmail" required 
                       class="w-full px-4 py-3.5 rounded-xl border border-slate-700 focus:outline-none focus:border-[#2EC4B6] bg-slate-900 text-sm font-medium text-white transition-colors" 
                       placeholder="ejemplo@nursecore.com">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Código de Identificación</label>
                <input type="text" id="loginCodigo" required 
                       class="w-full px-4 py-3.5 rounded-xl border border-slate-700 focus:outline-none focus:border-[#2EC4B6] bg-slate-900 text-sm font-medium text-white transition-colors" 
                       placeholder="Tu código (ej. ENF-001)">
            </div>

            <div id="loginError" class="hidden bg-red-900/40 border border-red-700 text-red-300 text-sm px-4 py-3 rounded-xl"></div>

            <button onclick="validarLogin()" id="btnLogin" class="w-full bg-[#2EC4B6] hover:bg-[#239c90] text-slate-950 font-black py-4 rounded-xl shadow-md hover:shadow-xl transition-all text-sm mt-6 flex items-center justify-center gap-2 transform hover:-translate-y-0.5">
                <span id="btnLoginText">Ingresar</span> →
            </button>
        </div>

        <div class="text-center mt-6">
            <p class="text-xs text-slate-500">¿No tienes una cuenta? <a href="registro.html" class="text-[#2EC4B6] hover:underline font-semibold">Regístrate aquí</a></p>
        </div>
    </div>

    <script src="supabase.js"></script>
    <script src="app.js"></script>
    <script>
        async function validarLogin() {
            const email = document.getElementById("loginEmail").value.trim();
            const codigo = document.getElementById("loginCodigo").value.trim();
            const btnText = document.getElementById("btnLoginText");
            const errorDiv = document.getElementById("loginError");

            if (!email || !codigo) {
                mostrarError("Por favor completa todos los campos.");
                return;
            }

            btnText.textContent = "Ingresando...";
            document.getElementById("btnLogin").disabled = true;
            errorDiv.classList.add('hidden');

            const { data, error } = await loginUsuario(email, codigo);

            if (error) {
                mostrarError(error);
                btnText.textContent = "Ingresar";
                document.getElementById("btnLogin").disabled = false;
            } else {
                window.location.href = "elegir-usuario.html";
            }
        }

        function mostrarError(msg) {
            const errorDiv = document.getElementById("loginError");
            errorDiv.textContent = "❌ " + msg;
            errorDiv.classList.remove('hidden');
        }

        // Permitir Enter para enviar
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') validarLogin();
        });
    </script>
</body>
</html>
