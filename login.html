<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NurseCore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#1e293b] font-sans text-slate-200 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-[#0f172a] p-8 rounded-3xl shadow-2xl border border-slate-800">
        
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-[#2EC4B6] tracking-tight">NurseCore</h1>
            <p class="text-xs text-slate-400 font-medium mt-2 uppercase tracking-wider">Sistema de Enfermería</p>
        </div>

        <form id="loginForm" onsubmit="validarLogin(event)" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Nombre de Usuario o Código</label>
                <input type="text" id="loginUser" required 
                       class="w-full px-4 py-3.5 rounded-xl border border-slate-700 focus:outline-none focus:border-[#2EC4B6] bg-slate-900 text-sm font-medium text-white transition-colors" 
                       placeholder="Tu nombre o código registrado">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Contraseña (Tu Código NUC)</label>
                <input type="password" id="loginPassword" required 
                       class="w-full px-4 py-3.5 rounded-xl border border-slate-700 focus:outline-none focus:border-[#2EC4B6] bg-slate-900 text-sm font-medium text-white transition-colors" 
                       placeholder="••••••••">
            </div>

            <button type="submit" class="w-full bg-[#2EC4B6] hover:bg-[#239c90] text-slate-950 font-black py-4 rounded-xl shadow-md hover:shadow-xl transition-all text-sm mt-6 flex items-center justify-center gap-2 transform hover:-translate-y-0.5">
                <span>Ingresar</span> →
            </button>
        </form>

        <div class="text-center mt-6">
            <p class="text-xs text-slate-500">¿No tienes una cuenta? <a href="registro.html" class="text-[#2EC4B6] hover:underline font-semibold">Regístrate aquí</a></p>
        </div>
    </div>

    <script>
        function validarLogin(event) {
            event.preventDefault(); 
            
            // Obtenemos los valores ingresados por el usuario
            const usuarioIngresado = document.getElementById("loginUser").value.trim();
            const passIngresada = document.getElementById("loginPassword").value.trim();

            // Recuperamos lo que está guardado en el navegador
            const codigoRegistrado = localStorage.getItem("codigoUsuario");
            const nombreRegistrado = localStorage.getItem("nombreUsuario");

            // Si no hay datos en la máquina, mandamos a registrar
            if (!codigoRegistrado || !nombreRegistrado) {
                alert("❌ Error: No hay ninguna cuenta registrada en este dispositivo. Por favor, regístrate primero.");
                window.location.href = "registro.html";
                return;
            }

            // Flexibilidad total: El usuario puede poner su NOMBRE o su CÓDIGO en el primer campo,
            // pero en la contraseña SIEMPRE debe poner su código NUC.
            const esUsuarioValido = (usuarioIngresado === nombreRegistrado || usuarioIngresado === codigoRegistrado);
            const esPasswordValido = (passIngresada === codigoRegistrado);
            
            if (esUsuarioValido && esPasswordValido) {
                // Guardamos la sesión activa con el nombre
                localStorage.setItem("usuarioLogueado", nombreRegistrado);
                
                // Enrutamiento inteligente según el rol previo
                const rolExistente = localStorage.getItem("tipoUsuario");
                
                if (rolExistente) {
                    if (rolExistente === "estudiante") {
                        window.location.href = "dashboard-estudiante.html";
                    } else if (rolExistente === "profesional") {
                        window.location.href = "dashboard-profesional.html";
                    }
                } else {
                    window.location.href = "elegir-usuario.html";
                }
                
            } else {
                alert("❌ Credenciales incorrectas. Verifica que hayas escrito bien tu nombre (o código) y que tu contraseña coincida exactamente con tu código NUC registrado.");
            }
        }
    </script>
</body>
</html>
