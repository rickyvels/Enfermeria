<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — NurseCore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-3xl shadow-xl w-[400px]">

        <h1 class="text-4xl font-bold text-center text-blue-600 mb-3">NurseCore</h1>
        <p class="text-center text-slate-500 mb-8">Iniciar sesión</p>

        <div class="space-y-5">

            <input
                type="email"
                placeholder="Correo electrónico"
                class="input-light"
            />

            <input
                type="password"
                placeholder="Contraseña"
                class="input-light"
            />

            <button
                onclick="window.location.href='elegir-usuario.html'"
                class="btn-primary"
            >
                Ingresar
            </button>

            <p class="text-center text-slate-500 text-sm">
                ¿No tienes cuenta?
                <a href="elegir-usuario.html" class="text-blue-600 font-semibold hover:underline">
                    Regístrate
                </a>
            </p>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
