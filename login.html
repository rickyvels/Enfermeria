<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NurseCore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#1e293b] font-sans text-slate-200 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-[#0f172a] p-8 rounded-3xl shadow-2xl border border-slate-800">

        <div class="text-center mb-7">
            <h1 class="text-4xl font-black text-[#2EC4B6] tracking-tight">NurseCore</h1>
            <p class="text-xs text-slate-400 font-medium mt-1 uppercase tracking-wider">Sistema de Enfermería</p>
        </div>

        <!-- ══ BOTÓN GOOGLE (principal) ══ -->
        <button onclick="loginConGoogle()" id="btnGoogle"
            class="w-full flex items-center justify-center gap-3 bg-white hover:bg-slate-50 text-slate-800 font-bold py-4 rounded-xl shadow-md hover:shadow-lg transition-all border border-slate-200 mb-6">
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span>Continuar con Google</span>
        </button>

        <!-- Separador -->
        <div class="flex items-center gap-3 mb-6">
            <div class="flex-1 h-px bg-slate-700"></div>
            <span class="text-xs text-slate-500 font-semibold uppercase tracking-wider">o con código</span>
            <div class="flex-1 h-px bg-slate-700"></div>
        </div>

        <!-- ══ LOGIN CLÁSICO ══ -->
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Correo Electrónico</label>
                <input type="email" id="loginEmail"
                    class="w-full px-4 py-3.5 rounded-xl border border-slate-700 focus:outline-none focus:border-[#2EC4B6] bg-slate-900 text-sm font-medium text-white transition-colors"
                    placeholder="ejemplo@nursecore.com">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Código de Identificación</label>
                <div class="relative">
                    <input type="password" id="loginCodigo"
                        class="w-full px-4 py-3.5 rounded-xl border border-slate-700 focus:outline-none focus:border-[#2EC4B6] bg-slate-900 text-sm font-medium text-white transition-colors pr-12"
                        placeholder="Tu código (ej. CEP-001)">
                    <button onclick="toggleVerCodigo()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200 transition text-lg" id="eyeBtn">👁</button>
                </div>
            </div>

            <div id="loginError" class="hidden bg-red-900/40 border border-red-700 text-red-300 text-sm px-4 py-3 rounded-xl"></div>

            <button onclick="validarLogin()" id="btnLogin"
                class="w-full bg-[#2EC4B6] hover:bg-[#239c90] text-slate-950 font-black py-4 rounded-xl shadow-md hover:shadow-xl transition-all text-sm mt-2 flex items-center justify-center gap-2 transform hover:-translate-y-0.5">
                <span id="btnLoginText">Ingresar →</span>
            </button>
        </div>

        <div class="text-center mt-6">
            <p class="text-xs text-slate-500">¿No tienes cuenta? <a href="registro.html" class="text-[#2EC4B6] hover:underline font-semibold">Regístrate aquí</a></p>
        </div>
    </div>

    <script src="supabase.js"></script>
    <script src="app.js"></script>
    <script>
    // Si ya hay sesión activa, redirigir directo
    document.addEventListener('DOMContentLoaded', () => {
        const usuario = getUsuarioActual();
        if (usuario.email && usuario.tipo) {
            window.location.href = 'elegir-usuario.html';
        }
    });

    function loginConGoogle() {
        const btn = document.getElementById('btnGoogle');
        btn.innerHTML = `<div class="w-5 h-5 border-2 border-slate-300 border-t-slate-600 rounded-full animate-spin"></div><span>Conectando con Google...</span>`;
        btn.disabled = true;
        auth.loginConGoogle("https://rickyvels.github.io/Enfermeria/auth-callback.html");
    }

    async function validarLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const codigo = document.getElementById('loginCodigo').value.trim();
        const errorDiv = document.getElementById('loginError');
        const btnText = document.getElementById('btnLoginText');

        if (!email || !codigo) {
            errorDiv.textContent = '⚠️ Completa todos los campos.';
            errorDiv.classList.remove('hidden');
            return;
        }

        btnText.textContent = 'Verificando...';
        document.getElementById('btnLogin').disabled = true;
        errorDiv.classList.add('hidden');

        const { data, error } = await loginUsuario(email, codigo);

        if (error) {
            errorDiv.textContent = '❌ ' + error;
            errorDiv.classList.remove('hidden');
            btnText.textContent = 'Ingresar →';
            document.getElementById('btnLogin').disabled = false;
        } else {
            window.location.href = 'elegir-usuario.html';
        }
    }

    function toggleVerCodigo() {
        const input = document.getElementById('loginCodigo');
        const btn = document.getElementById('eyeBtn');
        if (input.type === 'password') {
            input.type = 'text';
            btn.textContent = '🙈';
        } else {
            input.type = 'password';
            btn.textContent = '👁';
        }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') validarLogin(); });
    </script>
</body>
</html>
