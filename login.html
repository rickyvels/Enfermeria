<form id="loginForm" class="space-y-4" onsubmit="validarLogin(event)">
    <div>
        <label class="block text-sm font-semibold text-slate-600 mb-1">Correo Electrónico</label>
        <input type="email" id="loginEmail" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-teal-500 bg-slate-50 text-sm" placeholder="ejemplo@nursecore.com">
    </div>
    <div>
        <label class="block text-sm font-semibold text-slate-600 mb-1">Contraseña</label>
        <input type="password" id="loginPassword" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-teal-500 bg-slate-50 text-sm" placeholder="••••••••">
    </div>

    <button type="submit" class="w-full bg-[#2EC4B6] hover:bg-[#259b8f] text-slate-950 font-bold py-3 rounded-xl shadow-md transition-all text-sm mt-4">
        Ingresar
    </button>
</form>

<script>
function validarLogin(event) {
    event.preventDefault(); // Evita que la página se recargue bruscamente
    
    const email = document.getElementById("loginEmail").value.trim();
    const pass = document.getElementById("loginPassword").value.trim();

    if (email !== "" && pass !== "") {
        // Guardamos de forma simulada que hay sesión activa
        localStorage.setItem("usuarioLogueado", email);
        // Avanza de forma segura
        window.location.href = "elegir-usuario.html";
    }
}
</script>
