<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleccionar Rol - NurseCore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#1e293b] text-slate-100 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="max-w-2xl w-full text-center">
        <h1 class="text-4xl font-black mb-2 text-white">Bienvenido a <span class="text-[#2EC4B6]">NurseCore</span></h1>
        <p class="text-slate-400 mb-10 text-sm">Selecciona tu rol para personalizar tu espacio de trabajo de enfermería</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- Opción Estudiante -->
            <button onclick="seleccionarRol('estudiante')" class="bg-[#0f172a] border border-slate-800 p-8 rounded-3xl text-left hover:border-emerald-400 transition-all card-hover group">
                <div class="text-4xl mb-4">🎓</div>
                <h2 class="text-2xl font-bold text-white mb-2 group-hover:text-emerald-400">Estudiante / Interno</h2>
                <p class="text-xs text-slate-400 leading-relaxed">Accede de forma guiada a simulación clínica, control de Kardex educativo e historiales controlados.</p>
            </button>

            <!-- Opción Profesional -->
            <button onclick="seleccionarRol('profesional')" class="bg-[#0f172a] border border-slate-800 p-8 rounded-3xl text-left hover:border-cyan-400 transition-all card-hover group">
                <div class="text-4xl mb-4">👩‍⚕️</div>
                <h2 class="text-2xl font-bold text-white mb-2 group-hover:text-cyan-400">Enfermero Profesional</h2>
                <p class="text-xs text-slate-400 leading-relaxed">Módulo clínico completo. Gestión hospitalaria avanzada, validación de CEP y monitoreo crítico en tiempo real.</p>
            </button>

        </div>
    </div>

    <script>
        // Verificación de seguridad básica
        if (!localStorage.getItem("usuarioLogueado")) {
            window.location.href = "login.html";
        }

        function seleccionarRol(rol) {
            localStorage.setItem("tipoUsuario", rol);
            if (rol === "estudiante") {
                window.location.href = "perfil-estudiante.html";
            } else {
                window.location.href = "perfil-profesional.html";
            }
        }
    </script>
</body>
</html>
