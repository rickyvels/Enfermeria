<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signos Vitales</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

</head>

<body class="bg-slate-100">

<div class="p-10">

<h1 class="text-5xl font-bold text-slate-800 mb-10">
Registro de Signos Vitales
</h1>

<div class="bg-white p-10 rounded-3xl shadow-xl">

<div class="grid grid-cols-2 gap-6">

<input
type="text"
placeholder="Presión arterial"
class="input-style"
/>

<input
type="text"
placeholder="Frecuencia cardíaca"
class="input-style"
/>

<input
type="text"
placeholder="Temperatura"
class="input-style"
/>

<input
type="text"
placeholder="Saturación de oxígeno"
class="input-style"
/>

<input
type="text"
placeholder="Frecuencia respiratoria"
class="input-style"
/>

<input
type="text"
placeholder="Glucosa"
class="input-style"
/>

</div>

<button class="btn-primary mt-8">
Guardar Registro
</button>

</div>

<div class="bg-white mt-10 p-8 rounded-3xl shadow-xl">

<h2 class="text-3xl font-bold mb-6">
Historial reciente
</h2>

<div class="space-y-4">

<div class="bg-slate-50 p-4 rounded-2xl">
08:00 AM - Presión: 120/80
</div>

<div class="bg-slate-50 p-4 rounded-2xl">
12:00 PM - Temperatura: 36.7°C
</div>

<div class="bg-slate-50 p-4 rounded-2xl">
04:00 PM - Saturación: 98%
</div>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
