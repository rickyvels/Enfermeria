<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kardex — NurseCore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-100">

    <div class="p-10">

        <div class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-4">
                <button
                    onclick="history.back()"
                    class="bg-white px-5 py-3 rounded-2xl shadow hover:scale-105 transition text-slate-700 font-medium"
                >
                    ← Regresar
                </button>
                <h1 class="text-5xl font-bold text-slate-800">Kardex de Enfermería</h1>
            </div>
            <button class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-4 rounded-2xl font-semibold">
                + Nuevo Registro
            </button>
        </div>

        <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
            <table class="w-full">
                <thead class="bg-blue-600 text-white">
                    <tr>
                        <th class="p-5 text-left">Hora</th>
                        <th class="p-5 text-left">Procedimiento</th>
                        <th class="p-5 text-left">Responsable</th>
                        <th class="p-5 text-left">Estado</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="border-b hover:bg-slate-50">
                        <td class="p-5 text-slate-800">08:00 AM</td>
                        <td class="p-5 text-slate-800">Administración de medicamentos</td>
                        <td class="p-5 text-slate-600">Enf. María López</td>
                        <td class="p-5">
                            <span class="bg-green-100 text-green-700 px-3 py-1 rounded-lg font-semibold text-sm">Completado</span>
                        </td>
                    </tr>
                    <tr class="border-b hover:bg-slate-50">
                        <td class="p-5 text-slate-800">12:00 PM</td>
                        <td class="p-5 text-slate-800">Control de glucosa</td>
                        <td class="p-5 text-slate-600">Enf. Carlos Ruiz</td>
                        <td class="p-5">
                            <span class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-lg font-semibold text-sm">Pendiente</span>
                        </td>
                    </tr>
                    <tr class="hover:bg-slate-50">
                        <td class="p-5 text-slate-800">04:00 PM</td>
                        <td class="p-5 text-slate-800">Monitoreo de signos vitales</td>
                        <td class="p-5 text-slate-600">Enf. Ana Torres</td>
                        <td class="p-5">
                            <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-lg font-semibold text-sm">Programado</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script src="supabase.js"></script>
    <script src="app.js"></script>
</body>
</html>
