<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kardex</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

</head>

<body class="bg-slate-100">

<div class="p-10">

<div class="flex justify-between items-center mb-10">

<h1 class="text-5xl font-bold text-slate-800">
Kardex de Enfermería
</h1>

<button class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-4 rounded-2xl font-semibold">
+ Nuevo Registro
</button>

</div>

<div class="bg-white rounded-3xl shadow-xl overflow-hidden">

<table class="w-full">

<thead class="bg-blue-600 text-white">

<tr>

<th class="p-5 text-left">Hora</th>

<th class="p-5 text-left">Procedimiento</th>

<th class="p-5 text-left">Responsable</th>

<th class="p-5 text-left">Estado</th>

</tr>

</thead>

<tbody>

<tr class="border-b">

<td class="p-5">08:00 AM</td>

<td class="p-5">Administración de medicamentos</td>

<td class="p-5">Enf. María López</td>

<td class="p-5 text-green-600 font-semibold">
Completado
</td>

</tr>

<tr class="border-b">

<td class="p-5">12:00 PM</td>

<td class="p-5">Control de glucosa</td>

<td class="p-5">Enf. Carlos Ruiz</td>

<td class="p-5 text-yellow-500 font-semibold">
Pendiente
</td>

</tr>

<tr>

<td class="p-5">04:00 PM</td>

<td class="p-5">Monitoreo de signos vitales</td>

<td class="p-5">Enf. Ana Torres</td>

<td class="p-5 text-blue-600 font-semibold">
Programado
</td>

</tr>

</tbody>

</table>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
