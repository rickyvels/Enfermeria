<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurar Perfil Profesional - NurseCore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#f0fdf4] font-sans text-slate-800 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-md border border-slate-100">
        <div class="text-center mb-6">
            <span class="text-4xl">👩‍⚕️</span>
            <h1 class="text-2xl font-black text-slate-900 mt-2">Perfil Profesional</h1>
            <p class="text-xs text-slate-400 font-medium mt-1">Completa tus datos de colegiatura antes de ingresar al sistema</p>
        </div>

        <form id="formPerfilProf" onsubmit="guardarPerfilProfesional(event)" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Especialidad Médica</label>
                <input type="text" id="profEspecialidad" required 
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-teal-500 bg-slate-50 text-sm" 
                       placeholder="Ej. Cuidados Intensivos, Pediatría">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Número de Colegiatura (CEP)</label>
                <input type="text" id="profColegiatura" required 
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-teal-500 bg-slate-50 text-sm" 
                       placeholder="Ej. CEP-74839">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Centro Hospitalario / Clínica</label>
                <input type="text" id="profHospital" required 
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-teal-500 bg-slate-50 text-sm" 
                       placeholder="Ej. Hospital Central del Sur">
            </div>

            <button type="submit" class="w-full bg-[#2EC4B6] hover:bg-[#239c90] text-slate-950 font-bold py-3.5 rounded-xl shadow-md transition-all text-sm mt-6 flex items-center justify-center gap-1">
                <span>Guardar y Continuar al Dashboard</span> →
            </button>
        </form>
    </div>

    <script src="app.js"></script>
    <script>
        function guardarPerfilProfesional(event) {
            event.preventDefault(); // Detiene la recarga de página por defecto
            
            // Captura de valores validados
            const especialidad = document.getElementById("profEspecialidad").value.trim();
            const colegiatura = document.getElementById("profColegiatura").value.trim();
            const hospital = document.getElementById("profHospital").value.trim();

            // Guardado persistente local
            localStorage.setItem("prof_especialidad", especialidad);
            localStorage.setItem("prof_colegiatura", colegiatura);
            localStorage.setItem("prof_hospital", hospital);
            localStorage.setItem("perfilConfigurado", "true");

            // Redirección segura al dashboard correcto
            window.location.href = "dashboard-profesional.html";
        }
    </script>
</body>
</html>
